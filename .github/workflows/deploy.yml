name: Build and Push to Sealos

# 触发条件：推送到 main 分支或手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Sealos Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pb-jd-bp-resolver:latest
            ${{ secrets.DOCKER_USERNAME }}/pb-jd-bp-resolver:${{ github.sha }}

      - name: Trigger Sealos redeploy (optional webhook)
        if: env.SEALOS_WEBHOOK != ''
        env:
          SEALOS_WEBHOOK: ${{ secrets.SEALOS_WEBHOOK }}
        run: |
          curl -X POST "$SEALOS_WEBHOOK" || true
